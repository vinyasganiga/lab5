<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="calculator" role="application" aria-label="Simple calculator">
    <div class="display" aria-hidden="false">
      <div class="previous-operand" id="previousOperand"></div>
      <div class="current-operand" id="currentOperand">0</div>
    </div>

    <div class="buttons">
      <button class="btn function" data-action="clear" aria-label="Clear">C</button>
      <button class="btn function" data-action="backspace" aria-label="Backspace">←</button>
      <button class="btn function" data-action="percent" aria-label="Percent">%</button>
      <button class="btn operator" data-action="operator" data-value="÷" aria-label="Divide">÷</button>

      <button class="btn number" data-action="number" data-value="7">7</button>
      <button class="btn number" data-action="number" data-value="8">8</button>
      <button class="btn number" data-action="number" data-value="9">9</button>
      <button class="btn operator" data-action="operator" data-value="×" aria-label="Multiply">×</button>

      <button class="btn number" data-action="number" data-value="4">4</button>
      <button class="btn number" data-action="number" data-value="5">5</button>
      <button class="btn number" data-action="number" data-value="6">6</button>
      <button class="btn operator" data-action="operator" data-value="-" aria-label="Minus">−</button>

      <button class="btn number" data-action="number" data-value="1">1</button>
      <button class="btn number" data-action="number" data-value="2">2</button>
      <button class="btn number" data-action="number" data-value="3">3</button>
      <button class="btn operator" data-action="operator" data-value="+" aria-label="Plus">+</button>

      <button class="btn number zero" data-action="number" data-value="0">0</button>
      <button class="btn number" data-action="number" data-value=".">.</button>
      <button class="btn equals" data-action="equals" aria-label="Equals">=</button>
    </div>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
